<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

<body>
  <div id="root" style="display:flex;align-items:center;justify-content:center;height:100%;font-family:sans-serif;color:#64748b">Cargando…</div>
  <script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect } from "react";
import { createRoot } from "react-dom/client";
import { createClient } from "@supabase/supabase-js";
import {
  Activity, LayoutDashboard, MessageSquare, Package, Users, MapPin, FileText,
  Settings, UserCog, LogOut, Send, Phone, Bot, Search, Plus, Pencil, Trash2,
  X, Sparkles, UserCheck, Pause, CheckCheck, Building2
} from "lucide-react";

// ============================ CONFIGURACIÓN ============================
// Reemplaza estos 4 valores con los tuyos (Supabase y n8n).
const CONFIG = {
  SUPABASE_URL: "https://bnwhgfoplaepxawommcw.supabase.co/rest/v1/",
  SUPABASE_ANON_KEY: "sb_publishable_S-SgNHuLEDpRzgjM-jHCmA_bnEyJmXy",
  N8N_ENVIAR_URL: "https://TU-N8N.up.railway.app/webhook/medicare-asesor-envia",
  N8N_CREAR_USUARIO_URL: "https://TU-N8N.up.railway.app/webhook/medicare-crear-usuario",
};
const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
const CATS = ["Movilidad", "Diagnóstico", "Respiratorio", "Mobiliario clínico"];
const iniciales = (n) => (n || "?").split(" ").filter(Boolean).slice(0, 2).map((p) => p[0]).join("").toUpperCase();
const horaCorta = (iso) => new Date(iso).toLocaleTimeString("es-VE", { hour: "numeric", minute: "2-digit", hour12: true });

// ============================ UI BÁSICA ============================
function Modal({ title, onClose, onSave, saveLabel = "Guardar", children }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick={onClose}>
      <div className="w-full max-w-md rounded-xl bg-white shadow-xl" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between border-b border-slate-100 px-5 py-3">
          <h3 className="font-semibold text-slate-900">{title}</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><X size={18} /></button>
        </div>
        <div className="space-y-3 p-5">{children}</div>
        <div className="flex justify-end gap-2 border-t border-slate-100 px-5 py-3">
          <button onClick={onClose} className="rounded-lg px-4 py-2 text-sm text-slate-600 hover:bg-slate-100">Cancelar</button>
          <button onClick={onSave} className="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700">{saveLabel}</button>
        </div>
      </div>
    </div>
  );
}
const Field = ({ label, children }) => (
  <label className="block">
    <span className="mb-1 block text-xs font-medium text-slate-500">{label}</span>
    {children}
  </label>
);
const inputCls = "w-full rounded-lg border border-slate-200 px-3 py-2 text-sm outline-none focus:border-emerald-400";
function Badge({ tono, children }) {
  const m = { verde: "bg-emerald-50 text-emerald-700", azul: "bg-blue-50 text-blue-700", ambar: "bg-amber-50 text-amber-700", rojo: "bg-red-50 text-red-700", gris: "bg-slate-100 text-slate-600" };
  return <span className={`inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium ${m[tono]}`}>{children}</span>;
}

// ============================ LOGIN ============================
function Login() {
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState("");
  const [cargando, setCargando] = useState(false);
  const entrar = async () => {
    setErr(""); setCargando(true);
    const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if (error) setErr("Correo o contraseña incorrectos.");
    setCargando(false);
  };
  return (
    <div className="flex min-h-screen items-center justify-center bg-slate-100 p-4">
      <div className="w-full max-w-sm rounded-2xl bg-white p-8 shadow-sm">
        <div className="mb-6 flex flex-col items-center text-center">
          <div className="mb-3 flex h-12 w-12 items-center justify-center rounded-xl bg-emerald-500 text-white"><Activity size={26} /></div>
          <h1 className="text-lg font-bold tracking-tight text-slate-900">Suministros Medicare C.A</h1>
          <p className="text-sm text-slate-500">Panel de ventas</p>
        </div>
        <div className="space-y-3">
          <Field label="Correo">
            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className={inputCls} placeholder="tu@correo.com" />
          </Field>
          <Field label="Contraseña">
            <input type="password" value={pass} onChange={(e) => setPass(e.target.value)} onKeyDown={(e) => e.key === "Enter" && entrar()} className={inputCls} placeholder="••••••••" />
          </Field>
          {err && <p className="text-sm text-red-600">{err}</p>}
          <button onClick={entrar} disabled={cargando} className="w-full rounded-lg bg-emerald-600 py-2.5 text-sm font-semibold text-white hover:bg-emerald-700 disabled:opacity-60">
            {cargando ? "Entrando…" : "Iniciar sesión"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================ CONVERSACIONES ============================
function Conversaciones() {
  const [convs, setConvs] = useState([]);
  const [activa, setActiva] = useState(null);
  const [msgs, setMsgs] = useState([]);
  const [texto, setTexto] = useState("");
  const [busca, setBusca] = useState("");

  const cargarConvs = () =>
    supabase.from("conversaciones").select("*, vendedor:vendedores(nombre), zona:zonas(nombre)")
      .order("actualizada_en", { ascending: false }).then(({ data }) => setConvs(data || []));

  useEffect(() => {
    cargarConvs();
    const canal = supabase.channel("rt-conv")
      .on("postgres_changes", { event: "*", schema: "public", table: "conversaciones" }, cargarConvs)
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "mensajes" }, (p) => {
        setMsgs((prev) => (activa && p.new.conversacion_id === activa.id && !prev.some((m) => m.id === p.new.id)) ? [...prev, p.new] : prev);
        cargarConvs();
      }).subscribe();
    return () => supabase.removeChannel(canal);
  }, [activa]);

  const abrir = async (c) => {
    setActiva(c);
    const { data } = await supabase.from("mensajes").select("*").eq("conversacion_id", c.id).order("creado_en");
    setMsgs(data || []);
  };
  const intervenir = async () => {
    const v = !activa.intervenida;
    await supabase.from("conversaciones").update({ intervenida: v, estado: v ? "intervenida" : "bot" }).eq("id", activa.id);
    setActiva({ ...activa, intervenida: v });
    cargarConvs();
  };
  const enviar = async () => {
    if (!texto.trim()) return;
    const t = texto; setTexto("");
    await supabase.from("mensajes").insert({ conversacion_id: activa.id, rol: "asesor", texto: t });
    fetch(CONFIG.N8N_ENVIAR_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ telefono: activa.telefono, texto: t }) }).catch(() => {});
  };

  const lista = convs.filter((c) => (c.nombre_cliente || "").toLowerCase().includes(busca.toLowerCase()) || c.telefono.includes(busca));
  const estado = (c) => c.intervenida ? <Badge tono="ambar">Atendida por ti</Badge> : c.vendedor ? <Badge tono="azul">{c.vendedor.nombre}</Badge> : <Badge tono="verde">Sofía atendiendo</Badge>;

  return (
    <div className="flex h-full">
      <div className="flex w-80 shrink-0 flex-col border-r border-slate-200 bg-white">
        <div className="border-b border-slate-100 p-3">
          <div className="relative">
            <Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
            <input value={busca} onChange={(e) => setBusca(e.target.value)} placeholder="Buscar" className="w-full rounded-lg border border-slate-200 bg-slate-50 py-2 pl-9 pr-3 text-sm outline-none focus:border-emerald-400" />
          </div>
        </div>
        <div className="flex-1 overflow-y-auto">
          {lista.length === 0 && <p className="p-4 text-center text-sm text-slate-400">Aún no hay conversaciones.</p>}
          {lista.map((c) => (
            <button key={c.id} onClick={() => abrir(c)} className={`flex w-full gap-3 border-b border-slate-50 px-3 py-3 text-left ${activa?.id === c.id ? "bg-emerald-50" : "hover:bg-slate-50"}`}>
              <div className="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-emerald-100 text-sm font-semibold text-emerald-700">{iniciales(c.nombre_cliente)}</div>
              <div className="min-w-0 flex-1">
                <div className="truncate text-sm font-semibold text-slate-900">{c.nombre_cliente || c.telefono}</div>
                <div className="truncate text-xs text-slate-500">{c.telefono}</div>
                <div className="mt-1">{estado(c)}</div>
              </div>
            </button>
          ))}
        </div>
      </div>
      {activa ? (
        <div className="flex flex-1 flex-col bg-stone-100">
          <div className="flex items-center justify-between border-b border-slate-200 bg-white px-5 py-3">
            <div className="flex items-center gap-3">
              <div className="flex h-10 w-10 items-center justify-center rounded-full bg-emerald-100 text-sm font-semibold text-emerald-700">{iniciales(activa.nombre_cliente)}</div>
              <div>
                <div className="text-sm font-semibold text-slate-900">{activa.nombre_cliente || activa.telefono}</div>
                <div className="flex items-center gap-1 text-xs text-slate-500"><Phone size={11} /> {activa.telefono}{activa.zona && <><span className="mx-1">·</span><MapPin size={11} /> {activa.zona.nombre}</>}</div>
              </div>
            </div>
            <div className="text-right">
              <div className="text-xs text-slate-400">Asignada a</div>
              <div className="text-sm font-semibold text-slate-700">{activa.vendedor?.nombre || "Pendiente"}</div>
            </div>
          </div>
          <div className="flex-1 space-y-2 overflow-y-auto px-6 py-4">
            {msgs.map((m) => m.rol === "sistema" ? (
              <div key={m.id} className="my-2 flex justify-center"><span className="max-w-md rounded-full bg-amber-50 px-3 py-1 text-center text-xs text-amber-700">{m.texto}</span></div>
            ) : (
              <div key={m.id} className={`flex ${m.rol === "cliente" ? "justify-start" : "justify-end"}`}>
                <div className={`max-w-md whitespace-pre-line rounded-2xl px-3.5 py-2 text-sm shadow-sm ${m.rol === "cliente" ? "bg-white text-slate-800" : m.rol === "sofia" ? "bg-emerald-100 text-slate-800" : "bg-emerald-600 text-white"}`}>
                  {m.rol !== "cliente" && <div className={`mb-0.5 flex items-center gap-1 text-xs font-semibold ${m.rol === "sofia" ? "text-emerald-700" : "text-emerald-100"}`}>{m.rol === "sofia" ? <><Sparkles size={11} /> Sofía</> : <><UserCheck size={11} /> Asesor</>}</div>}
                  {m.texto}
                  <div className={`mt-0.5 text-right text-[10px] ${m.rol === "asesor" ? "text-emerald-100" : "text-slate-400"}`}>{horaCorta(m.creado_en)}</div>
                </div>
              </div>
            ))}
          </div>
          <div className="border-t border-slate-200 bg-white px-4 py-3">
            {activa.intervenida ? (
              <div className="flex items-center gap-2">
                <input value={texto} onChange={(e) => setTexto(e.target.value)} onKeyDown={(e) => e.key === "Enter" && enviar()} placeholder="Escribe como asesor…" className="flex-1 rounded-full border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm outline-none focus:border-emerald-400" />
                <button onClick={enviar} className="flex h-10 w-10 items-center justify-center rounded-full bg-emerald-600 text-white hover:bg-emerald-700"><Send size={17} /></button>
                <button onClick={intervenir} className="rounded-full px-3 py-2 text-xs text-slate-500 hover:bg-slate-100">Devolver a Sofía</button>
              </div>
            ) : (
              <div className="flex items-center justify-between gap-3 rounded-xl bg-slate-50 px-4 py-2.5 ring-1 ring-inset ring-slate-200">
                <div className="flex items-center gap-2 text-sm text-slate-500"><Bot size={16} className="text-emerald-500" /> Sofía está respondiendo automáticamente</div>
                <button onClick={intervenir} className="inline-flex items-center gap-1.5 rounded-full bg-slate-900 px-3.5 py-1.5 text-xs font-semibold text-white hover:bg-slate-700"><Pause size={13} /> Intervenir</button>
              </div>
            )}
          </div>
        </div>
      ) : (
        <div className="flex flex-1 items-center justify-center text-sm text-slate-400">Selecciona una conversación</div>
      )}
    </div>
  );
}

// ============================ INVENTARIO ============================
function Inventario() {
  const [items, setItems] = useState([]);
  const [q, setQ] = useState("");
  const [cat, setCat] = useState("Todas");
  const [modal, setModal] = useState(null);
  const vacio = { sku: "", nombre: "", categoria: "Movilidad", precio: "", stock: "", descripcion: "" };
  const load = () => supabase.from("productos").select("*").order("categoria").then(({ data }) => setItems(data || []));
  useEffect(() => { load(); }, []);
  const guardar = async () => {
    const p = { ...modal, precio: Number(modal.precio) || 0, stock: Number(modal.stock) || 0 };
    if (p.id) await supabase.from("productos").update(p).eq("id", p.id);
    else await supabase.from("productos").insert(p);
    setModal(null); load();
  };
  const borrar = async (id) => { if (confirm("¿Eliminar este producto?")) { await supabase.from("productos").delete().eq("id", id); load(); } };
  const fil = items.filter((p) => (cat === "Todas" || p.categoria === cat) && p.nombre.toLowerCase().includes(q.toLowerCase()));
  return (
    <div className="p-6">
      <div className="mb-4 flex flex-wrap items-center justify-between gap-3">
        <div className="flex gap-2">
          <div className="relative">
            <Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
            <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Buscar producto" className="w-56 rounded-lg border border-slate-200 py-2 pl-9 pr-3 text-sm outline-none focus:border-emerald-400" />
          </div>
          <select value={cat} onChange={(e) => setCat(e.target.value)} className="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm outline-none focus:border-emerald-400">
            <option>Todas</option>{CATS.map((c) => <option key={c}>{c}</option>)}
          </select>
        </div>
        <button onClick={() => setModal(vacio)} className="inline-flex items-center gap-2 rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700"><Plus size={16} /> Agregar producto</button>
      </div>
      <div className="overflow-hidden rounded-xl border border-slate-200 bg-white">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
            <tr><th className="px-4 py-3">SKU</th><th className="px-4 py-3">Producto</th><th className="px-4 py-3">Categoría</th><th className="px-4 py-3 text-right">Precio</th><th className="px-4 py-3 text-center">Stock</th><th className="px-4 py-3 text-center">Estado</th><th className="px-4 py-3"></th></tr>
          </thead>
          <tbody className="divide-y divide-slate-100">
            {fil.map((p) => (
              <tr key={p.id} className="hover:bg-slate-50">
                <td className="px-4 py-3 font-mono text-xs text-slate-400">{p.sku}</td>
                <td className="px-4 py-3 font-medium text-slate-900">{p.nombre}</td>
                <td className="px-4 py-3 text-slate-500">{p.categoria}</td>
                <td className="px-4 py-3 text-right font-semibold text-slate-900">${Number(p.precio).toLocaleString()}</td>
                <td className="px-4 py-3 text-center text-slate-600">{p.stock}</td>
                <td className="px-4 py-3 text-center">{p.stock === 0 ? <Badge tono="rojo">Agotado</Badge> : p.stock <= 6 ? <Badge tono="ambar">Bajo</Badge> : <Badge tono="verde">En stock</Badge>}</td>
                <td className="px-4 py-3"><div className="flex justify-end gap-1">
                  <button onClick={() => setModal(p)} className="rounded p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-700"><Pencil size={15} /></button>
                  <button onClick={() => borrar(p.id)} className="rounded p-1.5 text-slate-400 hover:bg-red-50 hover:text-red-600"><Trash2 size={15} /></button>
                </div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal && (
        <Modal title={modal.id ? "Editar producto" : "Nuevo producto"} onClose={() => setModal(null)} onSave={guardar}>
          <Field label="SKU (código)"><input value={modal.sku} onChange={(e) => setModal({ ...modal, sku: e.target.value })} className={inputCls} placeholder="MOV-010" /></Field>
          <Field label="Nombre"><input value={modal.nombre} onChange={(e) => setModal({ ...modal, nombre: e.target.value })} className={inputCls} /></Field>
          <Field label="Categoría"><select value={modal.categoria} onChange={(e) => setModal({ ...modal, categoria: e.target.value })} className={inputCls}>{CATS.map((c) => <option key={c}>{c}</option>)}</select></Field>
          <div className="flex gap-3">
            <Field label="Precio ($)"><input type="number" value={modal.precio} onChange={(e) => setModal({ ...modal, precio: e.target.value })} className={inputCls} /></Field>
            <Field label="Stock"><input type="number" value={modal.stock} onChange={(e) => setModal({ ...modal, stock: e.target.value })} className={inputCls} /></Field>
          </div>
          <Field label="Descripción"><input value={modal.descripcion || ""} onChange={(e) => setModal({ ...modal, descripcion: e.target.value })} className={inputCls} placeholder="Para qué sirve" /></Field>
        </Modal>
      )}
    </div>
  );
}

// ============================ VENDEDORES ============================
function Vendedores() {
  const [items, setItems] = useState([]);
  const [modal, setModal] = useState(null);
  const vacio = { nombre: "", telefono: "", estado: "disponible" };
  const load = () => supabase.from("vendedores").select("*").order("nombre").then(({ data }) => setItems(data || []));
  useEffect(() => { load(); }, []);
  const guardar = async () => {
    const v = { nombre: modal.nombre, telefono: modal.telefono, estado: modal.estado };
    if (modal.id) await supabase.from("vendedores").update(v).eq("id", modal.id);
    else await supabase.from("vendedores").insert(v);
    setModal(null); load();
  };
  const borrar = async (id) => { if (confirm("¿Eliminar este vendedor?")) { await supabase.from("vendedores").delete().eq("id", id); load(); } };
  return (
    <div className="p-6">
      <div className="mb-4 flex justify-end"><button onClick={() => setModal(vacio)} className="inline-flex items-center gap-2 rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700"><Plus size={16} /> Agregar vendedor</button></div>
      <div className="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3">
        {items.map((v) => (
          <div key={v.id} className="rounded-xl border border-slate-200 bg-white p-5">
            <div className="flex items-start gap-3">
              <div className="flex h-10 w-10 items-center justify-center rounded-full bg-slate-800 text-sm font-semibold text-white">{iniciales(v.nombre)}</div>
              <div className="flex-1">
                <div className="flex items-center justify-between"><h4 className="font-semibold text-slate-900">{v.nombre}</h4><Badge tono={v.estado === "disponible" ? "verde" : "ambar"}>{v.estado}</Badge></div>
                <div className="mt-0.5 flex items-center gap-1 text-xs text-slate-500"><Phone size={12} /> {v.telefono || "—"}</div>
              </div>
            </div>
            <div className="mt-4 flex justify-end gap-1 border-t border-slate-100 pt-3">
              <button onClick={() => setModal(v)} className="rounded p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-700"><Pencil size={15} /></button>
              <button onClick={() => borrar(v.id)} className="rounded p-1.5 text-slate-400 hover:bg-red-50 hover:text-red-600"><Trash2 size={15} /></button>
            </div>
          </div>
        ))}
      </div>
      {modal && (
        <Modal title={modal.id ? "Editar vendedor" : "Nuevo vendedor"} onClose={() => setModal(null)} onSave={guardar}>
          <Field label="Nombre"><input value={modal.nombre} onChange={(e) => setModal({ ...modal, nombre: e.target.value })} className={inputCls} /></Field>
          <Field label="Teléfono"><input value={modal.telefono || ""} onChange={(e) => setModal({ ...modal, telefono: e.target.value })} className={inputCls} placeholder="+58 414-..." /></Field>
          <Field label="Estado"><select value={modal.estado} onChange={(e) => setModal({ ...modal, estado: e.target.value })} className={inputCls}><option value="disponible">disponible</option><option value="ocupado">ocupado</option><option value="inactivo">inactivo</option></select></Field>
        </Modal>
      )}
    </div>
  );
}

// ============================ ZONAS ============================
function Zonas() {
  const [zonas, setZonas] = useState([]);
  const [vends, setVends] = useState([]);
  const [modal, setModal] = useState(null);
  const vacio = { nombre: "", vendedor_id: "", municipios: "" };
  const load = async () => {
    const { data: z } = await supabase.from("zonas").select("*, vendedor:vendedores(nombre), municipios(id,nombre)").order("nombre");
    setZonas(z || []);
    const { data: v } = await supabase.from("vendedores").select("id,nombre").order("nombre");
    setVends(v || []);
  };
  useEffect(() => { load(); }, []);
  const abrir = (z) => setModal(z ? { id: z.id, nombre: z.nombre, vendedor_id: z.vendedor_id || "", municipios: (z.municipios || []).map((m) => m.nombre).join(", ") } : vacio);
  const guardar = async () => {
    const datos = { nombre: modal.nombre, vendedor_id: modal.vendedor_id || null };
    let zonaId = modal.id;
    if (zonaId) { await supabase.from("zonas").update(datos).eq("id", zonaId); }
    else { const { data } = await supabase.from("zonas").insert(datos).select().single(); zonaId = data.id; }
    await supabase.from("municipios").delete().eq("zona_id", zonaId);
    const nombres = modal.municipios.split(",").map((s) => s.trim()).filter(Boolean);
    if (nombres.length) await supabase.from("municipios").insert(nombres.map((nombre) => ({ nombre, zona_id: zonaId })));
    setModal(null); load();
  };
  const borrar = async (id) => { if (confirm("¿Eliminar esta zona?")) { await supabase.from("zonas").delete().eq("id", id); load(); } };
  return (
    <div className="p-6">
      <div className="mb-4 rounded-xl border border-blue-200 bg-blue-50/50 p-4 text-sm text-blue-900">Sofía usa estos municipios para asignar al vendedor de cada zona. Escribe los municipios separados por coma.</div>
      <div className="mb-4 flex justify-end"><button onClick={() => abrir(null)} className="inline-flex items-center gap-2 rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700"><Plus size={16} /> Agregar zona</button></div>
      <div className="grid grid-cols-1 gap-4 md:grid-cols-2">
        {zonas.map((z) => (
          <div key={z.id} className="rounded-xl border border-slate-200 bg-white p-5">
            <div className="flex items-start justify-between">
              <div><div className="flex items-center gap-2 font-semibold text-slate-900"><MapPin size={15} className="text-emerald-500" /> {z.nombre}</div>
                <div className="mt-0.5 text-xs text-slate-500">Asesor: {z.vendedor?.nombre || "sin asignar"}</div></div>
              <div className="flex gap-1">
                <button onClick={() => abrir(z)} className="rounded p-1.5 text-slate-400 hover:bg-slate-100 hover:text-slate-700"><Pencil size={15} /></button>
                <button onClick={() => borrar(z.id)} className="rounded p-1.5 text-slate-400 hover:bg-red-50 hover:text-red-600"><Trash2 size={15} /></button>
              </div>
            </div>
            <div className="mt-3 flex flex-wrap gap-1.5">{(z.municipios || []).map((m) => <span key={m.id} className="rounded-md bg-slate-100 px-2 py-0.5 text-xs text-slate-600">{m.nombre}</span>)}</div>
          </div>
        ))}
      </div>
      {modal && (
        <Modal title={modal.id ? "Editar zona" : "Nueva zona"} onClose={() => setModal(null)} onSave={guardar}>
          <Field label="Nombre de la zona"><input value={modal.nombre} onChange={(e) => setModal({ ...modal, nombre: e.target.value })} className={inputCls} placeholder="Caracas Norte" /></Field>
          <Field label="Vendedor asignado"><select value={modal.vendedor_id} onChange={(e) => setModal({ ...modal, vendedor_id: e.target.value })} className={inputCls}><option value="">— sin asignar —</option>{vends.map((v) => <option key={v.id} value={v.id}>{v.nombre}</option>)}</select></Field>
          <Field label="Municipios (separados por coma)"><textarea rows={3} value={modal.municipios} onChange={(e) => setModal({ ...modal, municipios: e.target.value })} className={`${inputCls} resize-none`} placeholder="Chacao, Baruta, El Hatillo" /></Field>
        </Modal>
      )}
    </div>
  );
}

// ============================ COTIZACIONES ============================
function Cotizaciones() {
  const [items, setItems] = useState([]);
  useEffect(() => { supabase.from("cotizaciones").select("*, vendedor:vendedores(nombre)").order("creada_en", { ascending: false }).then(({ data }) => setItems(data || [])); }, []);
  return (
    <div className="p-6">
      <div className="overflow-hidden rounded-xl border border-slate-200 bg-white">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"><tr><th className="px-4 py-3">N°</th><th className="px-4 py-3">Cliente</th><th className="px-4 py-3 text-right">Total</th><th className="px-4 py-3">Vendedor</th><th className="px-4 py-3 text-center">Estado</th></tr></thead>
          <tbody className="divide-y divide-slate-100">
            {items.length === 0 && <tr><td colSpan={5} className="px-4 py-8 text-center text-slate-400">Aún no hay cotizaciones.</td></tr>}
            {items.map((q) => (
              <tr key={q.id} className="hover:bg-slate-50">
                <td className="px-4 py-3 font-mono text-xs text-slate-400">#{q.numero}</td>
                <td className="px-4 py-3 font-medium text-slate-900">{q.cliente}</td>
                <td className="px-4 py-3 text-right font-semibold text-slate-900">${Number(q.total).toLocaleString()}</td>
                <td className="px-4 py-3 text-slate-600">{q.vendedor?.nombre || "—"}</td>
                <td className="px-4 py-3 text-center"><Badge tono={q.estado === "Aceptada" ? "verde" : q.estado === "Enviada" ? "azul" : "ambar"}>{q.estado}</Badge></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ============================ USUARIOS (solo admin) ============================
function Usuarios() {
  const [items, setItems] = useState([]);
  const [vends, setVends] = useState([]);
  const [modal, setModal] = useState(null);
  const [err, setErr] = useState("");
  const vacio = { email: "", password: "", nombre: "", rol: "vendedor", vendedor_id: "" };
  const load = async () => {
    const { data } = await supabase.from("perfiles").select("*, vendedor:vendedores(nombre)").order("creado_en");
    setItems(data || []);
    const { data: v } = await supabase.from("vendedores").select("id,nombre").order("nombre");
    setVends(v || []);
  };
  useEffect(() => { load(); }, []);
  const crear = async () => {
    setErr("");
    try {
      const res = await fetch(CONFIG.N8N_CREAR_USUARIO_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email: modal.email, password: modal.password, nombre: modal.nombre, rol: modal.rol, vendedor_id: modal.vendedor_id || null }) });
      if (!res.ok) throw new Error();
      setModal(null); setTimeout(load, 800);
    } catch { setErr("No se pudo crear. Revisa el webhook de n8n."); }
  };
  return (
    <div className="p-6">
      <div className="mb-4 flex justify-end"><button onClick={() => { setErr(""); setModal(vacio); }} className="inline-flex items-center gap-2 rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700"><Plus size={16} /> Crear subcuenta</button></div>
      <div className="overflow-hidden rounded-xl border border-slate-200 bg-white">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"><tr><th className="px-4 py-3">Nombre</th><th className="px-4 py-3">Correo</th><th className="px-4 py-3">Rol</th><th className="px-4 py-3">Vendedor</th></tr></thead>
          <tbody className="divide-y divide-slate-100">
            {items.map((u) => (
              <tr key={u.id} className="hover:bg-slate-50">
                <td className="px-4 py-3 font-medium text-slate-900">{u.nombre || "—"}</td>
                <td className="px-4 py-3 text-slate-600">{u.email || "—"}</td>
                <td className="px-4 py-3"><Badge tono={u.rol === "admin" ? "azul" : "gris"}>{u.rol}</Badge></td>
                <td className="px-4 py-3 text-slate-600">{u.vendedor?.nombre || "—"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal && (
        <Modal title="Crear subcuenta" onClose={() => setModal(null)} onSave={crear} saveLabel="Crear">
          <Field label="Nombre"><input value={modal.nombre} onChange={(e) => setModal({ ...modal, nombre: e.target.value })} className={inputCls} /></Field>
          <Field label="Correo"><input type="email" value={modal.email} onChange={(e) => setModal({ ...modal, email: e.target.value })} className={inputCls} /></Field>
          <Field label="Contraseña temporal"><input value={modal.password} onChange={(e) => setModal({ ...modal, password: e.target.value })} className={inputCls} /></Field>
          <Field label="Rol"><select value={modal.rol} onChange={(e) => setModal({ ...modal, rol: e.target.value })} className={inputCls}><option value="vendedor">vendedor</option><option value="admin">admin</option></select></Field>
          <Field label="Vincular a vendedor (opcional)"><select value={modal.vendedor_id} onChange={(e) => setModal({ ...modal, vendedor_id: e.target.value })} className={inputCls}><option value="">— ninguno —</option>{vends.map((v) => <option key={v.id} value={v.id}>{v.nombre}</option>)}</select></Field>
          {err && <p className="text-sm text-red-600">{err}</p>}
        </Modal>
      )}
    </div>
  );
}

// ============================ CONFIGURACIÓN ============================
function Configuracion() {
  const [cfg, setCfg] = useState(null);
  const [ok, setOk] = useState(false);
  useEffect(() => { supabase.from("configuracion").select("*").eq("id", 1).single().then(({ data }) => setCfg(data || { id: 1, bot_nombre: "Sofía", tono: "Cercano y amable", bienvenida: "", autoresp: true, autoasign: true })); }, []);
  if (!cfg) return <div className="p-6 text-sm text-slate-400">Cargando…</div>;
  const guardar = async () => { await supabase.from("configuracion").update({ bot_nombre: cfg.bot_nombre, tono: cfg.tono, bienvenida: cfg.bienvenida, autoresp: cfg.autoresp, autoasign: cfg.autoasign }).eq("id", 1); setOk(true); setTimeout(() => setOk(false), 2000); };
  const Toggle = ({ campo, titulo, desc }) => (
    <div className="flex items-center justify-between border-t border-slate-100 py-3">
      <div><div className="text-sm font-medium text-slate-800">{titulo}</div><div className="text-xs text-slate-500">{desc}</div></div>
      <button onClick={() => setCfg({ ...cfg, [campo]: !cfg[campo] })} className={`relative h-6 w-11 rounded-full transition-colors ${cfg[campo] ? "bg-emerald-500" : "bg-slate-300"}`}><span className={`absolute top-0.5 h-5 w-5 rounded-full bg-white transition-all ${cfg[campo] ? "left-5" : "left-0.5"}`} /></button>
    </div>
  );
  return (
    <div className="max-w-2xl space-y-5 p-6">
      <div className="rounded-xl border border-slate-200 bg-white p-5">
        <h3 className="mb-4 text-sm font-semibold text-slate-900">Identidad del asistente</h3>
        <Field label="Nombre del asistente"><input value={cfg.bot_nombre} onChange={(e) => setCfg({ ...cfg, bot_nombre: e.target.value })} className={inputCls} /></Field>
        <div className="mt-3"><Field label="Tono"><select value={cfg.tono} onChange={(e) => setCfg({ ...cfg, tono: e.target.value })} className={inputCls}><option>Cercano y amable</option><option>Formal y profesional</option><option>Directo y breve</option></select></Field></div>
        <div className="mt-3"><Field label="Mensaje de bienvenida"><textarea rows={3} value={cfg.bienvenida} onChange={(e) => setCfg({ ...cfg, bienvenida: e.target.value })} className={`${inputCls} resize-none`} /></Field></div>
      </div>
      <div className="rounded-xl border border-slate-200 bg-white p-5">
        <h3 className="text-sm font-semibold text-slate-900">Reglas</h3>
        <Toggle campo="autoresp" titulo="Respuesta automática" desc="Sofía responde sin intervención" />
        <Toggle campo="autoasign" titulo="Asignación automática por zona" desc="Asigna al vendedor de la zona del cliente" />
      </div>
      <div className="flex items-center gap-3">
        <button onClick={guardar} className="rounded-lg bg-emerald-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-emerald-700">Guardar cambios</button>
        {ok && <span className="flex items-center gap-1.5 text-sm font-medium text-emerald-600"><CheckCheck size={16} /> Guardado</span>}
      </div>
    </div>
  );
}

// ============================ SHELL ============================
function Shell({ perfil, email }) {
  const [vista, setVista] = useState("conversaciones");
  const admin = perfil?.rol === "admin";
  const nav = [
    { id: "resumen", label: "Resumen", icon: LayoutDashboard },
    { id: "conversaciones", label: "Conversaciones", icon: MessageSquare },
    { id: "inventario", label: "Inventario", icon: Package },
    { id: "vendedores", label: "Vendedores", icon: Users },
    { id: "zonas", label: "Zonas", icon: MapPin },
    { id: "cotizaciones", label: "Cotizaciones", icon: FileText },
    ...(admin ? [{ id: "usuarios", label: "Usuarios", icon: UserCog }] : []),
    { id: "configuracion", label: "Configuración", icon: Settings },
  ];
  const titulos = { resumen: "Resumen", conversaciones: "Conversaciones", inventario: "Inventario", vendedores: "Vendedores", zonas: "Zonas y municipios", cotizaciones: "Cotizaciones", usuarios: "Usuarios y subcuentas", configuracion: "Configuración del bot" };
  return (
    <div className="flex h-screen overflow-hidden bg-slate-50 font-sans text-slate-800">
      <aside className="hidden w-60 shrink-0 flex-col bg-slate-900 text-slate-300 md:flex">
        <div className="flex items-center gap-3 border-b border-slate-800 px-5 py-5">
          <div className="flex h-9 w-9 items-center justify-center rounded-lg bg-emerald-500 text-white"><Activity size={20} /></div>
          <div><div className="text-sm font-bold leading-tight text-white">Suministros</div><div className="text-xs text-slate-400">Medicare C.A</div></div>
        </div>
        <nav className="flex-1 space-y-1 px-3 py-4">
          {nav.map((n) => (
            <button key={n.id} onClick={() => setVista(n.id)} className={`flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors ${vista === n.id ? "bg-emerald-500 text-white" : "text-slate-300 hover:bg-slate-800 hover:text-white"}`}><n.icon size={18} />{n.label}</button>
          ))}
        </nav>
        <div className="border-t border-slate-800 p-3">
          <div className="mb-2 px-2 text-xs text-slate-400">{email}{admin && " · admin"}</div>
          <button onClick={() => supabase.auth.signOut()} className="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-300 hover:bg-slate-800 hover:text-white"><LogOut size={16} /> Cerrar sesión</button>
        </div>
      </aside>
      <main className="flex flex-1 flex-col overflow-hidden">
        <header className="flex shrink-0 items-center justify-between border-b border-slate-200 bg-white px-6 py-4">
          <h1 className="text-lg font-bold tracking-tight text-slate-900">{titulos[vista]}</h1>
          <span className="hidden items-center gap-2 rounded-full bg-emerald-50 px-3 py-1.5 text-xs font-medium text-emerald-700 sm:flex"><span className="h-2 w-2 rounded-full bg-emerald-500" /> Bot activo</span>
        </header>
        <div className="flex-1 overflow-y-auto">
          {vista === "resumen" && <Resumen />}
          {vista === "conversaciones" && <Conversaciones />}
          {vista === "inventario" && <Inventario />}
          {vista === "vendedores" && <Vendedores />}
          {vista === "zonas" && <Zonas />}
          {vista === "cotizaciones" && <Cotizaciones />}
          {vista === "usuarios" && admin && <Usuarios />}
          {vista === "configuracion" && <Configuracion />}
        </div>
      </main>
    </div>
  );
}

// ============================ RESUMEN ============================
function Resumen() {
  const [k, setK] = useState({ conv: 0, prod: 0, vend: 0, cot: 0 });
  useEffect(() => {
    (async () => {
      const c = await supabase.from("conversaciones").select("id", { count: "exact", head: true });
      const p = await supabase.from("productos").select("id", { count: "exact", head: true });
      const v = await supabase.from("vendedores").select("id", { count: "exact", head: true });
      const q = await supabase.from("cotizaciones").select("id", { count: "exact", head: true });
      setK({ conv: c.count || 0, prod: p.count || 0, vend: v.count || 0, cot: q.count || 0 });
    })();
  }, []);
  const Card = ({ icon: Icon, label, val, tono }) => (
    <div className="rounded-xl border border-slate-200 bg-white p-5">
      <div className="flex items-center justify-between"><span className="text-sm font-medium text-slate-500">{label}</span><div className={`flex h-9 w-9 items-center justify-center rounded-lg ${tono}`}><Icon size={18} /></div></div>
      <div className="mt-3 text-3xl font-bold tracking-tight text-slate-900">{val}</div>
    </div>
  );
  return (
    <div className="p-6">
      <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
        <Card icon={MessageSquare} label="Conversaciones" val={k.conv} tono="bg-emerald-50 text-emerald-600" />
        <Card icon={Package} label="Productos" val={k.prod} tono="bg-blue-50 text-blue-600" />
        <Card icon={Users} label="Vendedores" val={k.vend} tono="bg-violet-50 text-violet-600" />
        <Card icon={FileText} label="Cotizaciones" val={k.cot} tono="bg-amber-50 text-amber-600" />
      </div>
    </div>
  );
}

// ============================ APP ============================
function App() {
  const [session, setSession] = useState(undefined);
  const [perfil, setPerfil] = useState(null);
  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = supabase.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);
  useEffect(() => {
    if (session?.user) supabase.from("perfiles").select("*").eq("id", session.user.id).single().then(({ data }) => setPerfil(data));
    else setPerfil(null);
  }, [session]);
  if (session === undefined) return <div className="flex min-h-screen items-center justify-center text-sm text-slate-400">Cargando…</div>;
  if (!session) return <Login />;
  return <Shell perfil={perfil} email={session.user.email} />;
}

createRoot(document.getElementById("root")).render(<App />);

  </script>
