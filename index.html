<script>
(function () {
  function showMsg(msg) {
    var r = document.getElementById("root");
    if (r && !r.hasChildNodes()) {
      r.innerHTML = '<div style="padding:20px;font:14px/1.6 system-ui,sans-serif;color:#334155;max-width:640px;margin:40px auto">'
        + '<b style="color:#b91c1c">No se pudo cargar el panel.</b><br>' + msg + '</div>';
    }
  }
  window.addEventListener("error", function (e) {
    showMsg("Detalle: " + (e && e.message ? e.message : e) + "<br><br>Abre la consola (F12) y comparte el texto en rojo.");
  });
  window.addEventListener("unhandledrejection", function (e) {
    var r = (e && e.reason) ? (e.reason.message || e.reason) : "desconocido";
    showMsg("Detalle (promesa): " + r);
